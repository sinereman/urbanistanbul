backend:
  name: git-gateway
  branch: main

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "etkinlikler"
    label: "Etkinlikler"
    folder: "content/etkinlikler"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Başlık", name: "title", widget: "string"}
      - {label: "Kategori", name: "kategori", widget: "select", options: ["Tiyatro", "Sergi", "Müzik", "Lezzet", "Festival"]}
      - {label: "Tarih", name: "tarih", widget: "datetime", time_format: false}
      - {label: "Mekan", name: "mekan", widget: "string"}
      - {label: "Kapak Fotoğrafı", name: "image", widget: "image", required: false}
      - {label: "Fotoğraf Yönü", name: "foto_yon", widget: "select", options: ["yatay", "dikey"], default: "yatay"}
      - {label: "İçerik", name: "body", widget: "markdown"}

  - name: "atolye"
    label: "Atölye Yazıları"
    folder: "content/atolye"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Başlık", name: "title", widget: "string"}
      - {label: "Konu", name: "konu", widget: "select", options: ["Fotoğrafçılık", "Yazarlık", "Film", "Müzik Teorisi"]}
      - {label: "Sıra", name: "sira", widget: "number", default: 1}
      - {label: "Kapak Fotoğrafı", name: "image", widget: "image", required: false}
      - {label: "Fotoğraf Yönü", name: "foto_yon", widget: "select", options: ["yatay", "dikey"], default: "yatay"}
      - {label: "İçerik", name: "body", widget: "markdown"}

  - name: "teknoloji"
    label: "Teknoloji"
    folder: "content/teknoloji"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Başlık", name: "title", widget: "string"}
      - {label: "Tarih", name: "tarih", widget: "datetime", time_format: false}
      - {label: "Kapak Fotoğrafı", name: "image", widget: "image", required: false}
      - {label: "İçerik", name: "body", widget: "markdown"}
